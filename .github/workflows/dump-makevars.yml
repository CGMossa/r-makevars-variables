name: dump-makevars

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'vars/**'
      - 'README.md'
      - 'LICENSE*'

permissions:
  contents: write

jobs:
  dump:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: R CMD INSTALL (Makevars echo_vars prints $(.VARIABLES))
        shell: bash
        run: |
          set -o pipefail
          R CMD INSTALL . 2>&1 | tee install-${{ matrix.os }}.log

      - uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.os }}
          path: install-${{ matrix.os }}.log

  commit:
    name: commit logs to vars/
    needs: dump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: log-*
          merge-multiple: true

      - name: Refresh vars/
        run: |
          mkdir -p vars
          cp _artifacts/install-*.log vars/
          ls -la vars/

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vars/
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "ci: refresh Makevars variable dump [skip ci]"
          git push
